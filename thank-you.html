<script>
  // BloomRecorder's Whop checkout price is $19 (launch price) at time of writing.
  // If Whop's post-purchase redirect is ever configured to append a "value" query
  // param (e.g. ?value=19.00), prefer that so this stays correct if pricing changes.
  (function () {
    var params = new URLSearchParams(window.location.search);
    var value = parseFloat(params.get('value'));
    if (!value || isNaN(value)) value = 19.00;
    var currency = params.get('currency') || 'USD';
    fbq('track', 'Purchase', { value: value, currency: currency });
  })();
</script>
<style>
  :root {
    --bg: #0a0f0d; --text: #f3f1e7; --muted: #9db3ac;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;

    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
  }
  .card { max-width: 480px; }
  .bloom-text {
    background: linear-gradient(100deg, var(--bloom-1), var(--bloom-2) 45%, var(--bloom-3));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  h1 { font-size: 32px; margin-bottom: 16px; }
  p { color: var(--muted); font-size: 16px; line-height: 1.6; margin-bottom: 12px; }
  a.btn {
    display: inline-block; margin-top: 20px; padding: 14px 28px; border-radius: 999px;
    background: var(--bloom-2); color: #10120a; font-weight: 700; text-decoration: none;
  }
